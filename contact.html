<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agnar Daði Jónsson</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <h1>Agnar Daði Jónsson</h1>
      <div class="container_nav">
        <div><a href="/index.html">Home</a></div>
        <div><a href="/index.html">Um mig</a></div>
        <div><a href="/contact.html">Hafa samband</a></div>
      </div>
    </header>

    <main class="container_form">
      <section>
        <h2>Hafa samband</h2>
        <p>
          Ef þú vilt hafa samband vinsamlegast fylltu út formið hér að neðan:
        </p>
        <form action="/recieve.html" method="get" class="form">
          <label for="gender">
            Kyn:
            <select name="gender" id="gender" required>
              <option value=""></option>
              <option value="karl">Karl</option>
              <option value="kona">Kona</option>
              <option value="annað">Annað</option>
            </select>
            <br />
            <br />
            <label for="vibe">Ertu í stuði?</label>
            <input type="radio" name="lid" value="rautt" required> Ójá!
            <input type="radio" name="lid" value="blatt" required> Alls ekki!
            <br />
            <br />
            <label for="name">Nafn:</label>
            <input type="text" id="name" name="name" required />
            <br />
            <br />
            <label for="birthday">Fæðingardagur:</label>
            <input type="date" id="birthday" name="birthday" required />
            <br />
            <br />
            <label for="email">Netfang:</label>
            <input type="email" id="email" name="email" required />
            <br />
            <br />
            <label for="message" required></label>
            <textarea
              id="message"
              name="message"
              cols="40px"
              rows="5"
            >Skilaboð</textarea>
            <br />
            <input type="submit" value="Senda" />

        </form>
      </section>
    </main>

    <footer>
      <div class="container_footer">
        <p>&copy; 2026 Agnar Daði Jónsson</p>
        <a href="//instagram.com/nba" target="_blank"
          ><img
            src="/images/insta_logo.png"
            alt="insta_logo"
            style="width: 30px"
        /></a>
      </div>
    </footer>
  </body>
</html>
